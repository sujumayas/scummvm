kup"},{"do":"set","flag":"have_key"},{"do":"give","item":"key"},{"do":"say","text":"Taped to the back: one small brass key. Uncle, you beautiful cliché."}]},{"cond":"have_key","actions":[{"do":"say","text":"Constellations connected in his own ink. He renamed Orion 'The Diver'."}]},{"cond":"","actions":[{"do":"say","text":"A star chart, annotated to within an inch of its life. Where would I even start?"}]}],"pull":[{"do":"say","text":"It's pinned with the confidence of a man who never intended to move it. ...Or did he?"}]}},{"id":"drawer","name":"locked drawer","rect":[286,76,34,50],"at":[298,132],"state":"locked","states":{"locked":{"verbs":{"look":[{"do":"say","text":"A cabinet with one locked drawer. Scratches around the keyhole: opened nightly, locked religiously."}],"open":[{"do":"sound","id":"error"},{"do":"say","text":"Locked. Of course. He locked the DRAWER and left the front door open."}],"use key":[{"do":"sound","id":"open"},{"do":"state","hotspot":"drawer","state":"open"},{"do":"say","text":"Click. The most satisfying sound in detective work."}]}},"open":{"name":"open drawer","verbs":{"look":[{"do":"if","cond":"have_cylinder","then":[{"do":"say","text":"Empty now, except for a spare pair of spectacles and a pressed sea-flower."}],"else":[{"do":"say","text":"Inside: a single wax cylinder, nested in velvet like a relic. Which it might be."}]}],"pickup":[{"do":"if","cond":"have_cylinder","then":[{"do":"say","text":"I left the spectacles. He'll want them when he wakes. WHEN."}],"else":[{"do":"set","flag":"have_cylinder"},{"do":"give","item":"cylinder"},{"do":"say","text":"One wax cylinder, 'LA CANCIÓN'. The phonograph is right there."}]}],"close":[{"do":"sound","id":"close"},{"do":"state","hotspot":"drawer","state":"locked"},{"do":"say","text":"Locked again. Habit of the house."}]}}}},{"id":"artefacto_shelf","name":"el artefacto","rect":[294,8,26,50],"at":[304,130],"state":"off","states":{"off":{"verbs":{"look":[{"do":"say","text":"The famous artefacto: brass rings around a cold center. Dormant. The journal called it 'the anchor'."}],"use":[{"do":"say","text":"Nothing. Cold brass. It's waiting for something. A password? A... song?"}],"open":[{"do":"say","text":"There's no seam to open. It opens elsewhere, I suspect."}],"pickup":[{"do":"say","text":"It's fixed to its stand — and I'm not stealing from uncle until it's PROVEN necessary."}]}},"on":{"paint":[{"op":"image","id":"artefacto_on","x":300,"y":16}],"verbs":{"look":[{"do":"say","text":"The rings turn on their own now, spilling cyan light. It hums the cylinder's song back, one octave down."}],"use":[{"do":"call","script":"travel_down"}],"pickup":[{"do":"call","script":"travel_down"}]}}}},{"id":"rug_s","name":"wooden floor","rect":[40,128,240,16],"at":[180,136],"noWalk":true,"verbs":{"look":[{"do":"say","text":"Floorboards worn in a line from desk to divan. Forty years of pacing, one groove of thought."}]}}]},"abyss":{"name":"The Submarine Jungle","music":"abyss","paint":[{"op":"image","id":"bg_abyss","x":0,"y":0}],"walk":[[12,118,308,118,308,142,12,142]],"scale":{"y1":114,"s1":0.85,"y2":142,"s2":1},"actors":{"whalephant":{"x":235,"y":138,"dir":"L"},"fisher":{"x":52,"y":134,"dir":"D"}},"enter":[{"do":"set","flag":"loc_abyss"},{"do":"set","flag":"loc_study","value":false},{"do":"set","flag":"loc_celestial","value":false},{"do":"if","cond":"!abyss_seen","then":[{"do":"set","flag":"abyss_seen"},{"do":"say","text":"I'm... underwater. BREATHING underwater. In a jungle. Millions of years before breakfast."},{"do":"say","text":"The water isn't wet, exactly. It's more like the AIR here has opinions."},{"do":"say","actor":"whalephant","text":"« A new dreamer. Small. Anchored, this time — how refreshing. »"},{"do":"say","text":"The voice isn't in my ears. It's in my THOUGHTS. Rude. Convenient, but rude."}]}],"hotspots":[{"id":"trunk","name":"colossal trunk","rect":[16,0,116,116],"at":[90,126],"verbs":{"look":[{"do":"say","text":"A tree older than continents, wearing shelf-fungi like medals. Its crown is somewhere above the concept of 'up'."}],"push":[{"do":"say","text":"The tree does not notice. Geologically, neither did I."}]}},{"id":"flora","name":"glowing flora","rect":[130,60,60,56],"at":[166,126],"verbs":{"look":[{"do":"say","text":"Bioluminescent sprouts, teal and violet. They pulse gently — like a heartbeat, or a loading indicator."}],"pickup":[{"do":"say","text":"They dim when my hand gets close. Fine. FINE. Keep your photons."}]}},{"id":"kelp","name":"giant kelp","rect":[196,0,120,70],"at":[220,124],"verbs":{"look":[{"do":"say","text":"Kelp towers swaying to a current I can't feel. Or maybe to the whalephant's breathing. Same thing here, probably."}]}},{"id":"shafts","name":"light from above","rect":[130,0,64,56],"at":[166,124],"noWalk":true,"verbs":{"look":[{"do":"say","text":"Shafts of pale light from the surface. Except uncle's notes say that's not the surface. It's the FLOOR of the next layer."}]}},{"id":"sand","name":"seafloor","rect":[0,120,320,24],"at":[160,134],"noWalk":true,"verbs":{"look":[{"do":"say","text":"Soft pale sand, printed with one set of human slippers. Size: uncle."}],"pickup":[{"do":"say","text":"Evidence stays at the scene. Also it's sand."}]}}]},"celestial":{"name":"The Layer Above","music":"celestial","paint":[{"op":"image","id":"bg_celestial","x":0,"y":0},{"op":"image","id":"tortoise_img","x":52,"y":34}],"walk":[[16,116,304,116,304,140,16,140]],"scale":{"y1":112,"s1":0.85,"y2":140,"s2":1},"actors":{"tharma":{"x":150,"y":74},"dragon":{"x":248,"y":92,"dir":"L"}},"enter":[{"do":"set","flag":"loc_celestial"},{"do":"set","flag":"loc_abyss","value":false},{"do":"set","flag":"loc_study","value":false},{"do":"if","cond":"!celestial_seen","then":[{"do":"set","flag":"celestial_seen"},{"do":"say","text":"Trees made of starlight. Islands with nowhere to be. Tortoises... flying. Slowly. With dignity."},{"do":"say","text":"And there — floating in his pajamas, fast asleep, smiling—"},{"do":"say","text":"UNCLE!"},{"do":"say","actor":"narrator","text":"Across the sky, something vast and patient uncoils. The Threshold Dragon is already watching."}]}],"hotspots":[{"id":"startree","name":"starlight tree","rect":[0,0,90,100],"at":[60,126],"verbs":{"look":[{"do":"say","text":"A tree of pale light. Its leaves are very small ideas. I recognized two of mine and looked away politely."}],"pickup":[{"do":"say","text":"My hand passes through. 'Immaterial vegetation', the journal said. Uncle UNDERLINED it. Now I get the underline."}]}},{"id":"island","name":"floating island","rect":[24,44,62,30],"at":[70,124],"noWalk":true,"verbs":{"look":[{"do":"say","text":"A small island hangs in the air, unbothered by the whole concept of gravity. Property of no one. Envied by all."}]}},{"id":"tortoise_h","name":"flying tortoise","rect":[48,30,26,20],"at":[80,124],"noWalk":true,"verbs":{"look":[{"do":"say","text":"A sea-turtle with little white wings, migrating between layers at the speed of contentment."}],"talk":[{"do":"say","text":"Excuse me — which way to the top layer?"},{"do":"say","actor":"narrator","text":"The tortoise blinks once, meaning either 'up' or 'mind your own layer'."}]}},{"id":"cloudfloor","name":"cloud floor","rect":[0,116,320,28],"at":[160,132],"noWalk":true,"verbs":{"look":[{"do":"say","text":"Solid cloud. Springy. The whalephant said water is an atmosphere — so I suppose sky can be a floor. Layers all the way up."}]}}]}},"dialogs":{"whalephant_talk":{"start":"root","nodes":{"root":{"options":[{"text":"Have you seen my uncle? Old, bearded, probably in pajamas?","once":true,"next":"root","actions":[{"do":"say","actor":"whalephant","text":"« The pale dreamer. He came unanchored — all song, no tether. »"},{"do":"say","actor":"whalephant","text":"« He listened to one verse of my song and rose like a bubble toward the layer above. »"},{"do":"say","text":"Rose? ROSE where? There's only surface up there."},{"do":"say","actor":"whalephant","text":"« Surface. Sweet little word. This water is an atmosphere, dreamer. The air above is another. Above that — layers past counting. »"},{"do":"set","flag":"knows_unanchored"}]},{"text":"What ARE you, exactly?","once":true,"next":"root","actions":[{"do":"say","actor":"whalephant","text":"« My grandmothers walked on land. Their grandmothers swam. Mine will swim the dark between stars. We are a patient family. »"},{"do":"say","actor":"whalephant","text":"« I am the one who remembers the route. The song IS the route. »"}]},{"text":"Can you take me up to him?","cond":"knows_unanchored","next":"root","actions":[{"do":"if","cond":"verse_learned","then":[{"do":"say","actor":"whalephant","text":"« You hold the verse already. USE it, and rise. Mind the tortoises. »"}],"else":[{"do":"say","actor":"whalephant","text":"« I could teach you the RISING VERSE... but I cannot sing. My beard itches. A thousand years of tangles. »"},{"do":"say","actor":"whalephant","text":"« An itching singer is a public danger. Bring something to set my chin in order, and the verse is yours. »"},{"do":"say","text":"A comb. The colossal cosmic whale needs a COMB. Sure. Adding it to the case file."},{"do":"set","flag":"needs_comb"}]}]},{"text":"Why does your song do... all this?","once":true,"next":"root","actions":[{"do":"say","actor":"whalephant","text":"« Songs are the only maps that survive being folded. Everything else, time eats. »"},{"do":"say","text":"The bearded whalephant is confusing my mind. Uncle wrote exactly that. Now I get it."}]},{"text":"I'll be back. Don't... swim off.","end":true,"actions":[{"do":"say","actor":"whalephant","text":"« I have been here nine epochs. I will risk a tenth. »"}]}]}}},"fisher_talk":{"start":"root","nodes":{"root":{"options":[{"text":"You saw an old man here? Pale, bearded, pajamas?","once":true,"next":"root","actions":[{"do":"say","actor":"fisher","text":"Pale dreamer! Yes. Came from nowhere. Touched nothing. Looked at EVERYTHING."},{"do":"say","actor":"fisher","text":"Then big singer sang, and pale dreamer went up. Like bubble. Pop of light. Gone."},{"do":"say","text":"Confirmed sighting. The trail goes up. Trails never go somewhere convenient, like a café."},{"do":"set","flag":"fisher_witness"}]},{"text":"What do your people make of the whalephant?","once":true,"next":"root","actions":[{"do":"say","actor":"fisher","text":"Big singer keeps water kind. We keep beach clean. Good neighbors. It never borrows tools."}]},{"text":"The whalephant needs a comb. Know anything?","cond":"needs_comb","next":"root","actions":[{"do":"if","cond":"has(comb)","then":[{"do":"say","actor":"fisher","text":"You have comb! Go. Comb the mountain. Make history."}],"else":[{"do":"say","actor":"fisher","text":"Ictio has comb! Coral. Grandmother's. She combed the sea itself, grandmother."},{"do":"say","actor":"fisher","text":"Trade only. Ictio wants: small SHINING thing. Fisher rules."},{"do":"say","text":"A small shining thing. I'm sure I've been carrying exactly that since page one."}]}]},{"text":"Your spear technique looks excellent.","once":true,"next":"root","actions":[{"do":"say","actor":"fisher","text":"Thank you. Four generations of pointing sharp things at dinner. We also farm now. Dinner stopped running."}]},{"text":"Take care, Ictio.","end":true,"actions":[{"do":"say","actor":"fisher","text":"Swim straight, land person. Come back when sea is older."}]}]}}},"tharma_talk":{"start":"root","nodes":{"root":{"options":[{"text":"Uncle! It's Marina! WAKE UP!","next":"root","actions":[{"do":"say","actor":"tharma","text":"Mmm. Five more minutes. The tortoises are about to migrate... magnificent..."},{"do":"say","text":"Three DAYS, uncle. Your tea has evolved into a new organism."}]},{"text":"I found your journal. You wrote: 'never rise without an anchor'.","cond":"read_journal","once":true,"next":"root","actions":[{"do":"say","actor":"tharma","text":"...my journal? You READ my journal? ...Good. Good girl. Then you know what I forgot."},{"do":"say","actor":"tharma","text":"I heard the song and I rose, Marina. No anchor. And now there is no thread pointing down."},{"do":"set","flag":"tharma_admits"}]},{"text":"I played the cylinder. I HEARD the song, uncle.","cond":"heard_song","once":true,"next":"root","actions":[{"do":"say","actor":"tharma","text":"Then you understand why I followed it. Nobody hears that song and files a reasonable report."},{"do":"say","text":"I understand. I also brought the artefacto. SOMEBODY in this family reads warnings."}]},{"text":"The Ballenofante taught me the rising verse. Every verse has a fall, uncle. The dragon IS the way down.","cond":"verse_learned && tharma_admits","next":"root","actions":[{"do":"say","actor":"tharma","text":"The dragon...? The dragon. Of course. To be swallowed is to SURFACE. The last line of the song — I never let it finish!"},{"do":"say","actor":"tharma","text":"Marina. Take my hand. Introduce me to the door."},{"do":"set","flag":"tharma_convinced"},{"do":"say","actor":"narrator","text":"(Professor Tharma is ready. TALK TO the Threshold Dragon.)"}],"end":true},{"text":"I'll come back for you. Stay... afloat.","end":true,"actions":[{"do":"say","actor":"tharma","text":"Afloat is the one thing I cannot stop being, dear."}]}]}}}},"scripts":{"travel_down":[{"do":"if","cond":"has(artefacto)","then":[],"else":[{"do":"say","text":"I'm taking it. Sorry, shelf. It's PROVEN necessary now."},{"do":"give","item":"artefacto"}]},{"do":"sound","id":"teleport"},{"do":"fade","out":true,"speed":1.6},{"do":"title","text":"DOWN, AND DOWN","sub":"through the floor of one world into the weather of another","ms":2800},{"do":"music","id":null},{"do":"goto","room":"abyss","x":120,"y":130,"dir":"R"},{"do":"fade","out":false}],"finale":[{"do":"say","text":"Your Thresholdness — my uncle is ready to go home."},{"do":"say","actor":"narrator","text":"The dragon unwinds from the sky, slow as a tide. Its eyes are golden and enormously kind."},{"do":"say","actor":"tharma","text":"Extraordinary. Its scales are a star chart. Marina — LOOK — it's the one from my wall—"},{"do":"say","text":"Uncle. Focus. Homework later."},{"do":"sound","id":"teleport"},{"do":"shake","ms":500},{"do":"music","id":null},{"do":"title","text":"THE DRAGON OPENS ITS JAWS","sub":"gently, the way a library opens","ms":3000},{"do":"fade","out":true,"speed":1.2},{"do":"say","actor":"narrator","text":"Being swallowed, it turns out, is simply how a dream lets you go."},{"do":"music","id":"study"},{"do":"goto","room":"study","x":240,"y":134,"dir":"L"},{"do":"fade","out":false},{"do":"wait","ms":400},{"do":"say","actor":"narrator","text":"Marina woke in the study armchair. Dawn. And upstairs, for the first time in three days—"},{"do":"say","actor":"tharma","text":"MARINA! Have you seen my slippers?! And why, precisely, do I smell of ALGAE?"},{"do":"say","text":"He's back. Insufferable and back."},{"do":"sound","id":"fanfare"},{"do":"title","text":"CASE CLOSED — GENTLY","sub":"some mysteries you don't solve; you escort them home","ms":3400},{"do":"say","actor":"narrator","text":"'How many things we live beside that we do not see, do not hear, do not understand —'"},{"do":"say","actor":"narrator","text":"'— and here we all are, worrying about minor nonsense.'"},{"do":"end","text":"THE SONG OF THE BEARDED WHALEPHANT","sub":"after the story by Tharmathesis — made with Grog Studio"}]},"music":{"study":{"bpm":84,"steps":2,"tracks":[{"wave":"triangle","vol":0.11,"notes":"D4 . . . F4 . . . A4 . . . G4 . F4 . E4 . . . C4 . . . D4 . . . . . . ."},{"wave":"triangle","vol":0.15,"notes":"D3 . . . . . . . Bb2 . . . . . . . C3 . . . . . . . A2 . . . . . . ."}]},"cancion":{"bpm":72,"steps":2,"tracks":[{"wave":"sine","vol":0.16,"notes":"D4 . F4 . A4 . G4 . F4 . D4 . E4 . D4 . . . . . D4 . F4 . A4 . C5 . A4 . G4 . F4 . D4 . . . . ."},{"wave":"triangle","vol":0.18,"notes":"D2 . . . . . . . G2 . . . . . . . Bb2 . . . . . . . A2 . . . . . . ."},{"wave":"sine","vol":0.07,"notes":". . D5 . . . A4 . . . F4 . . . A4 . . . . . . . . ."}]},"abyss":{"bpm":66,"steps":2,"tracks":[{"wave":"sine","vol":0.13,"notes":"D3 . F3 . A3 . G3 . F3 . D3 . E3 . D3 . . . . . . . . ."},{"wave":"triangle","vol":0.17,"notes":"D2 . . . . . . . . . . . Bb1 . . . . . . . . . . . A1 . . . . . . ."},{"wave":"noise","vol":0.015,"notes":". . . . . . . x . . . . . . . ."}]},"celestial":{"bpm":100,"steps":2,"tracks":[{"wave":"sine","vol":0.1,"notes":"D5 A4 F4 A4 D5 A4 F4 A4 E5 A4 G4 A4 E5 A4 G4 A4 F5 C5 A4 C5 F5 C5 A4 C5 E5 C5 A4 C5 D5 . . ."},{"wave":"triangle","vol":0.13,"notes":"D3 . . . . . . . C3 . . . . . . . F2 . . . . . . . A2 . . . . . . ."}]}},"defaults":{"look":["Curious. But not evidence.","The dream renders it beautifully and tells me nothing.","I see it. It sees me. We agree to move on."],"pickup":["The satchel is for evidence, not souvenirs. ...Mostly.","It belongs to the scene. Or the epoch."],"use":["The universe considers my proposal. The universe passes.","That is not how this layer works, apparently."],"talk":["It keeps its counsel.","No answer. Even the silence here is well-composed."],"open":["It has no opinion about being opened."],"push":["It stays. Some things are better at staying than I am at pushing."],"pull":["No. And I pulled respectfully, too."]}};
